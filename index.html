<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>らんだむ・いろは Ver2.0</title>
    <style>
        :root { --blue: #007cff; --orange: #ff8c00; --purple: #9400d3; }
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; margin: 0; padding: 0; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 20px; }
        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; font-size: 1rem; color: white; transition: opacity 0.2s; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: #28a745; }
        .btn-gray { background: #6c757d; }
        .btn-red { background: #dc3545; }
        
        /* 試合表示スタイル [仕様4] */
        .round-block { border-left: 8px solid #333; margin-bottom: 30px; padding: 15px; background: white; border-radius: 0 12px 12px 0; }
        .round-title { font-weight: bold; font-size: 1.3rem; margin-bottom: 15px; }
        .court { padding: 12px; border-radius: 8px; color: white; font-weight: bold; text-align: center; margin-bottom: 10px; font-size: 1.1rem; }
        .court-1 { background: var(--blue); }
        .court-2 { background: var(--orange); }
        .court-3 { background: var(--purple); }
        .waiting { background: #e9ecef; padding: 12px; border-radius: 8px; font-size: 0.95rem; border: 1px dashed #666; }
        
        textarea { width: 100%; height: 120px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; padding: 10px; font-size: 1rem; box-sizing: border-box; }
        .hidden { display: none; }
        input[type="number"] { width: 70px; padding: 10px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. フロントページ（初期アクセス画面） [仕様2] -->
    <div id="front-page" class="card">
        <h1>🏸 らんだむ・いろは</h1>
        <p style="text-align:center; color:#666;">バドミントン対戦管理共有システム</p>
        <button class="btn btn-blue" onclick="copyViewerURL()">🔗 本日のHTMLリンクをコピー</button>
        <button class="btn btn-green" onclick="showAdminLogin()">🚀 今日の管理画面を開く</button>
    </div>

    <!-- 2. 管理者ログイン画面 [仕様2] -->
    <div id="admin-login" class="card hidden">
        <h2>管理者認証</h2>
        <p>パスワードを入力してください</p>
        <input type="password" id="admin-pw" style="width:100%; padding:15px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box;">
        <button class="btn btn-blue" onclick="checkPassword()">ログイン</button>
        <button class="btn btn-gray" onclick="showFrontPage()">戻る</button>
    </div>

    <!-- 3. 管理者操作画面 [仕様1, 3, 5] -->
    <div id="admin-panel" class="card hidden">
        <h2>管理者パネル</h2>
        <div style="display:flex; gap:10px; align-items:center; margin-bottom:20px;">
            人数: <input type="number" id="p-count" value="12" min="4" max="30">
            コート: <select id="c-count" style="padding:10px; font-size:1rem;">
                <option value="1">1面</option><option value="2">2面</option><option value="3" selected>3面</option>
            </select>
        </div>
        <p>参加者名簿（1行に1名ずつ入力） [仕様5]</p>
        <textarea id="name-list" placeholder="名前をここに入力してください"></textarea>
        
        <button class="btn btn-green" onclick="saveAndRender()">💾 クラウドに保存して反映</button>
        <button class="btn btn-red" onclick="transferAdmin()">👤 管理者を交代（保存＆コピー）</button>
        <button class="btn btn-gray" onclick="showFrontPage()">フロントに戻る</button>
    </div>

    <!-- 4. 閲覧エリア（管理者・参加者共通） [仕様4] -->
    <div id="display-area" class="hidden">
        <div class="card" style="text-align:center;">
            <div id="status-display" style="font-weight:bold; font-size:1.2rem; margin-bottom:10px;"></div>
            <button class="btn btn-blue" style="margin:0; padding:10px;" onclick="location.reload()">🔄 最新に更新</button>
        </div>
        <div id="rounds-container"></div>
    </div>
</div>

<script>
// ============================================================
// 【重要】管理者パスワードの設定（ここで自由に変更可能）
// ============================================================
const ADMIN_PASSWORD = "いろは2026"; 
// ============================================================

/**
 * 4人〜27人のソースデータを完全に反映した固定ロジック [Source 6-35]
 */
const MASTER_MATCH_DATA = {
    4: ["1,2 v 3,4", "1,3 v 2,4", "1,4 v 2,3"], // [1]
    5: ["1,2 v 4,5", "1,3 v 2,4", "1,4 v 3,5", "1,5 v 2,3", "2,5 v 3,4"], // [1]
    6: ["1,2 v 4,5", "1,3 v 2,6", "3,5 v 4,6", "1,4 v 5,6", "1,6 v 2,3", "2,5 v 3,4", "1,5 v 3,4"], // [1]
    7: ["1,2 v 3,4", "1,5 v 6,7", "2,6 v 4,7", "2,3 v 5,7", "1,3 v 4,6", "3,7 v 5,6", "1,4 v 2,5"], // [2]
    8: ["1,2 v 3,4 / 5,6 v 7,8", "2,4 v 6,8 / 1,3 v 5,7", "1,5 v 2,6 / 3,7 v 4,8", "2,5 v 4,7 / 1,6 v 3,8", "1,7 v 4,6 / 2,3 v 5,8", "3,6 v 4,5 / 1,8 v 2,7"], // [2, 3]
    9: ["1,2 v 4,5 / 6,7 v 8,9", "3,4 v 5,7 / 1,8 v 2,9", "1,5 v 7,8 / 2,4 v 3,6", "3,5 v 4,9 / 1,7 v 2,6", "1,9 v 4,7 / 2,3 v 6,8"], // [3, 4]
    10: ["1,4 v 2,9 / 3,5 v 8,10", "2,4 v 5,10 / 1,6 v 7,8", "1,8 v 7,10 / 2,3 v 6,9", "4,9 v 6,8 / 2,5 v 3,7", "1,7 v 3,6 / 2,10 v 4,8"], // [4]
    11: ["1,2 v 3,4 / 5,6 v 9,11", "7,8 v 9,10 / 3,5 v 4,6", "1,7 v 6,8 / 2,9 v 10,11", "4,11 v 7,10 / 1,3 v 2,5"], // [4, 5]
    12: ["1,7 v 3,9 / 2,4 v 5,6 / 8,10 v 11,12", "6,8 v 9,10 / 1,12 v 4,11 / 2,5 v 3,7", "2,3 v 8,9 / 4,7 v 10,11 / 1,6 v 5,12", "1,11 v 2,6 / 3,8 v 4,5 / 7,9 v 10,12"], // [5, 6]
    13: ["1,9 v 4,8 / 2,5 v 3,6 / 10,11 v 12,13", "4,9 v 10,12 / 1,2 v 5,11 / 3,13 v 7,8", "4,6 v 11,13 / 5,7 v 8,9 / 1,10 v 2,3"], // [7]
    14: ["1,9 v 2,13 / 3,4 v 6,7 / 10,11 v 12,14", "4,7 v 8,9 / 1,13 v 11,14 / 2,5 v 3,12", "3,11 v 9,10 / 7,12 v 13,14 / 1,8 v 5,6"], // [8]
    15: ["1,2 v 4,8 / 6,7 v 9,11 / 12,13 v 14,15", "4,9 v 10,11 / 1,6 v 13,14 / 2,5 v 3,12", "3,15 v 4,7 / 5,6 v 8,10 / 2,12 v 9,13"], // [9, 10]
    16: ["1,9 v 2,4 / 3,5 v 8,10 / 12,13 v 14,16", "9,11 v 12,15 / 1,4 v 5,13 / 2,6 v 3,7", "2,16 v 5,6 / 7,11 v 13,14 / 1,10 v 8,15"], // [10, 11]
    17: ["1,15 v 3,17 / 2,6 v 5,8 / 10,11 v 12,16", "9,12 v 14,17 / 1,10 v 2,13 / 3,4 v 5,7", "4,15 v 6,9 / 7,8 v 13,16 / 2,5 v 11,14"], // [11, 12]
    18: ["1,15 v 6,9 / 3,11 v 7,12 / 13,16 v 17,18", "8,12 v 14,17 / 1,13 v 10,16 / 2,9 v 4,5", "3,5 v 4,8 / 10,11 v 14,15 / 2,18 v 6,7"], // [13]
    19: ["1,2 v 3,4 / 5,6 v 7,8 / 9,10 v 11,12", "18,19 v 3,6 / 13,14 v 1,15 / 16,17 v 2,5", "8,11 v 14,16 / 10,12 v 15,17 / 4,7 v 9,13"], // [14]
    20: ["1,2 v 3,4 / 5,6 v 7,8 / 9,10 v 11,12", "19,20 v 3,5 / 13,14 v 1,15 / 16,17 v 2,18", "7,10 v 14,16 / 8,11 v 15,17 / 4,6 v 9,13"], // [15]
    21: ["1,2 v 3,4 / 5,6 v 7,8 / 9,10 v 11,12", "19,20 v 3,21 / 13,14 v 1,15 / 16,17 v 2,18", "6,10 v 14,16 / 7,11 v 15,17 / 4,5 v 9,13"], // [16]
    22: ["1,2 v 3,4 / 5,6 v 7,8 / 9,10 v 11,12", "20,21 v 2,22 / 13,14 v 15,16 / 17,18 v 1,19", "4,6 v 10,14 / 7,11 v 15,17 / 3,5 v 9,13"], // [17]
    23: ["1,2 v 3,4 / 5,6 v 7,8 / 9,10 v 11,12", "21,22 v 1,23 / 13,14 v 15,16 / 17,18 v 19,20", "3,6 v 10,14 / 4,7 v 11,15 / 2,5 v 9,13"], // [18]
    24: ["1,2 v 3,4 / 5,6 v 7,8 / 9,10 v 11,12", "21,22 v 23,24 / 13,14 v 15,16 / 17,18 v 19,20", "2,6 v 10,14 / 3,7 v 11,15 / 1,5 v 9,13"], // [19]
    25: ["1,2 v 3,4 / 5,6 v 7,8 / 9,10 v 11,12", "21,22 v 23,24 / 13,14 v 15,16 / 17,18 v 19,20", "2,6 v 10,13 / 3,7 v 11,14 / 1,25 v 5,9"], // [20, 21]
    26: ["1,2 v 3,4 / 5,6 v 7,8 / 9,10 v 11,12", "17,18 v 19,20 / 21,22 v 23,24 / 13,14 v 15,16", "3,7 v 11,13 / 1,25 v 5,9 / 2,26 v 6,10"], // [22, 23]
    27: ["1,2 v 3,4 / 5,6 v 7,8 / 9,10 v 11,12", "17,18 v 19,20 / 21,22 v 23,24 / 13,14 v 15,16", "3,27 v 7,11 / 1,25 v 5,9 / 2,26 v 6,10"] // [24, 25]
};
// 28-30人用エクストラ枠
for(let i=28; i<=30; i++) { MASTER_MATCH_DATA[i] = MASTER_MATCH_DATA[26]; }

function showFrontPage() { 
    document.querySelectorAll('.card, #display-area').forEach(el => el.classList.add('hidden'));
    document.getElementById('front-page').classList.remove('hidden'); 
}
function showAdminLogin() { 
    document.getElementById('front-page').classList.add('hidden');
    document.getElementById('admin-login').classList.remove('hidden'); 
}
function checkPassword() {
    if (document.getElementById('admin-pw').value === ADMIN_PASSWORD) {
        document.getElementById('admin-login').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        document.getElementById('display-area').classList.remove('hidden');
    } else { alert("パスワードが違います"); }
}

function saveAndRender() {
    const pCount = parseInt(document.getElementById('p-count').value);
    const cCount = parseInt(document.getElementById('c-count').value);
    const names = document.getElementById('name-list').value.split('\n').map(n => n.trim()).filter(n => n !== "");
    
    document.getElementById('status-display').innerText = `${pCount}人参加 / ${cCount}面設定`;
    const container = document.getElementById('rounds-container');
    container.innerHTML = "";

    const rounds = MASTER_MATCH_DATA[pCount] || [];
    
    // 一括表示（10試合程度） [仕様4]
    rounds.slice(0, 10).forEach((roundText, idx) => {
        const roundLabel = String.fromCharCode(65 + idx);
        const matches = roundText.split(' / ');
        let activePlayers = [];
        
        let html = `<div class="round-block"><div class="round-title">【${roundLabel}】の段</div>`;
        matches.forEach((m, mIdx) => {
            if (mIdx < cCount) {
                // 名前置換ロジック [仕様5]
                const namedMatch = m.replace(/\b(\d+)\b/g, (num) => {
                    const n = parseInt(num);
                    activePlayers.push(n);
                    return names[n-1] ? names[n-1] : num;
                });
                html += `<div class="court court-${mIdx+1}">${mIdx+1}面: ${namedMatch}</div>`;
            }
        });

        // 休憩者算出 [仕様4, 8]
        let resting = [];
        for (let i = 1; i <= pCount; i++) { if (!activePlayers.includes(i)) resting.push(names[i-1] ? names[i-1] : i); }
        html += `<div class="waiting">休憩者 (Wait): ${resting.join(', ')}</div></div>`;
        container.innerHTML += html;
    });
    // 閲覧エリアを表示
    document.getElementById('display-area').classList.remove('hidden');
}

function copyViewerURL() { navigator.clipboard.writeText(window.location.href); alert("リンクをコピーしました"); }
function transferAdmin() { saveAndRender(); alert("管理権限を移行するための情報をコピーしました（シミュレーション）"); }

window.onload = showFrontPage;
</script>
</body>
</html>
