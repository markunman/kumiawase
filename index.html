let state = { p: 14, courts: 1, done: [], names: {}, locked: true };
const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
const getTodayStr = () => { const d = new Date(); return d.getFullYear() + ("0" + (d.getMonth() + 1)).slice(-2) + ("0" + d.getDate()).slice(-2); };

function jumpToAdmin() {
    const pw = prompt("管理者パスワードを入力してください\n(設定済みの1234など)");
    if(pw === ADMIN_PW) window.location.search = `?d=${getTodayStr()}&mode=admin&pw=${pw}`;
    else alert("パスワードが違います");
}

function copyHtmlLinkDirect() {
    const rawUrl = `${window.location.origin}${window.location.pathname}?d=${getTodayStr()}`;
    const htmlTag = `<a href="${rawUrl}" target="_blank" rel="noopener noreferrer" style="font-size:24px; font-weight:bold; color:#1a73e8; text-decoration:none; border-bottom:2px solid #1a73e8;">👉 本日のゲーム練習組み合わせ</a>`;
    navigator.clipboard.writeText(htmlTag).then(() => alert("リンクをコピーしました！"));
}

async function saveToCloud() {
    const params = new URLSearchParams(window.location.search);
    if(params.get('pw') !== ADMIN_PW) return alert("権限がありません");
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.innerText = "保存中...";
    try {
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY.trim() },
            body: JSON.stringify(state)
        });
        alert("保存完了！");
    } catch(e) { alert("失敗"); }
    btn.disabled = false; btn.innerText = "💾 クラウドに保存して反映";
}

async function handoverAdmin() {
    await saveToCloud();
    const url = `${window.location.origin}${window.location.pathname}?d=${getTodayStr()}&mode=admin&pw=${ADMIN_PW}`;
    navigator.clipboard.writeText(`管理者交代：\n${url}`);
    alert("交代用リンクをコピーしました");
}

async function loadFromCloud() {
    try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
            headers: { 'X-Master-Key': MASTER_KEY.trim(), 'X-Bin-Meta': 'false' }
        });
        if(res.ok) {
            const data = await res.json();
            state.p = data.p || 14;
            state.done = data.done || [];
            state.names = data.names || {};
            const params = new URLSearchParams(window.location.search);
            if(params.get('mode') !== 'admin' || params.get('pw') !== ADMIN_PW) state.courts = data.courts || 1;
        }
    } catch(e) {}
    renderNames(); render();
}

window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const urlDate = params.get('d');
    const isAdmin = params.get('mode') === 'admin' && params.get('pw') === ADMIN_PW;

    if (urlDate === getTodayStr()) {
        document.getElementById('main-content').style.display = 'block';
        if (isAdmin) {
            state.locked = false;
            document.getElementById('admin-tools').style.display = 'block';
            document.getElementById('modeDisplay').innerText = "管理者モード";
        } else {
            document.getElementById('modeDisplay').innerText = "閲覧モード";
            document.getElementById('miniLinkBtn').classList.add('visitor');
            state.locked = true;
        }
        renderNames(); render();
        loadFromCloud();
    } else {
        document.getElementById('setup-panel').style.display = 'block';
    }
};

function changeP(n) { if(!state.locked) { state.p = Math.max(4, Math.min(30, state.p + n)); renderNames(); render(); } }
function changeC(n) { if(!state.locked) { state.courts = parseInt(n); render(); } }

function renderNames() {
    const grid = document.getElementById('nameGrid');
    if(!grid) return;
    grid.innerHTML = '';
    for(let i=1; i<=state.p; i++) {
        const input = document.createElement('input');
        input.className = 'name-input';
        input.value = state.names[i] || '';
        input.disabled = state.locked;
        input.oninput = (e) => { state.names[i] = e.target.value; render(); };
        grid.appendChild(input);
    }
    document.getElementById('pCount').innerText = state.p;
}

function render() {
    const board = document.getElementById('matchBoard');
    if(!board) return;
    board.innerHTML = '';
    
    // 指定された人数のスケジュールを取得（なければ空配列）
    const schedule = SCHEDULE_DATA[state.p] || [];
    
    // スケジュールの数に合わせて表示（最大20試合程度）
    schedule.forEach((roundStr, i) => {
        const div = document.createElement('div');
        div.className = `round`;
        const isDone = (state.done || []).includes(i);
        div.style.opacity = isDone ? "0.4" : "1";
        
        let label = ALPHABET[i] || (i+1);
        let html = `<div style="display:flex; justify-content:space-between;"><b>試合 ${label}</b> <input type="checkbox" ${isDone?'checked':''} ${state.locked?'disabled':''} onchange="toggle(${i})"></div>`;
        
        // "1,2v3,4/5,6v7,8" のような形式を分割してコートごとに表示
        const courts = roundStr.split('/');
        let playingIds = [];

        courts.forEach((courtStr, cIdx) => {
            // "1,2v3,4" を "1,2" と "3,4" に分ける
            const teams = courtStr.split('v');
            if(teams.length < 2) return;
            
            const teamA = teams[0].split(',');
            const teamB = teams[1].split(',');
            
            // 出場プレイヤーIDを記録
            teamA.forEach(id => playingIds.push(parseInt(id)));
            teamB.forEach(id => playingIds.push(parseInt(id)));

            const n = state.names || {};
            const p1 = n[teamA[0]] || teamA[0];
            const p2 = n[teamA[1]] || teamA[1];
            const p3 = n[teamB[0]] || teamB[0];
            const p4 = n[teamB[1]] || teamB[1];

            html += `<div class="court court-${cIdx+1}">${p1}・${p2} <small>vs</small> ${p3}・${p4}</div>`;
        });

        // 休憩者の計算
        let restingNames = [];
        for(let j=1; j<=state.p; j++) {
            if(!playingIds.includes(j)) {
                restingNames.push(state.names[j] || j);
            }
        }
        if(restingNames.length > 0) {
            html += `<div class="rest-area">☕ 休み: ${restingNames.join('・')}</div>`;
        }

        div.innerHTML = html;
        board.appendChild(div);
    });
}

function toggle(i) {
    if(state.locked) return;
    if(!state.done) state.done = [];
    if(state.done.includes(i)) state.done = state.done.filter(x => x !== i);
    else state.done.push(i);
    render();
}
