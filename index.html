let currentState = { p: 12, c: 3, names: [], isAdmin: false };

function init() {
    const params = new URLSearchParams(window.location.search);
    if (params.has('admin')) {
        document.getElementById('admin-panel').style.display = 'block';
        currentState.isAdmin = true;
    }
    // クラウド保存・読み込みのシミュレーション
    saveAndRender();
}

/** 認証・管理者モード解禁 [仕様2] */
function unlockAdmin() {
    const input = prompt("管理者パスワードを入力してください");
    if (input === ADMIN_PASSWORD) {
        document.getElementById('admin-panel').style.display = 'block';
        currentState.isAdmin = true;
        alert("管理者モード解除成功");
    } else {
        alert("パスワードが正しくありません");
    }
}

/** メイン描画処理 [仕様4, 5] */
function saveAndRender() {
    const pCount = parseInt(document.getElementById('p-count').value);
    const cCount = parseInt(document.getElementById('c-count').value);
    const nameText = document.getElementById('name-list').value;
    const names = nameText.split('\n').map(n => n.trim()).filter(n => n !== "");
    
    const container = document.getElementById('display-area');
    container.innerHTML = "";

    const rounds = MASTER_MATCH_DATA[pCount] || [];
    
    // 一括表示 (10ラウンド程度) [仕様4]
    rounds.forEach((roundText, idx) => {
        const roundLabel = String.fromCharCode(65 + idx); // A, B, C... [仕様4]
        const matches = roundText.split(' / ');
        let activePlayers = [];
        
        let html = `<div class="round-block">
            <div class="round-title">【${roundLabel}】の段</div>
            <div class="court-grid">`;
        
        matches.forEach((m, mIdx) => {
            if (mIdx < cCount) {
                // 名前への置換ロジック [仕様5]
                const namedMatch = m.replace(/\b(\d+)\b/g, (num) => {
                    const n = parseInt(num);
                    activePlayers.push(n);
                    return names[n-1] ? names[n-1] : num;
                });
                html += `<div class="court court-${mIdx+1}">${mIdx+1}面: ${namedMatch}</div>`;
            }
        });

        // 休憩者の自動算出 [仕様4, 8]
        let resting = [];
        for (let i = 1; i <= pCount; i++) {
            if (!activePlayers.includes(i)) {
                resting.push(names[i-1] ? names[i-1] : i);
            }
        }
        
        html += `</div><div class="waiting">休憩者 (Wait): ${resting.join(', ')}</div></div>`;
        container.innerHTML += html;
    });
}

/** 共有リンク機能 [仕様2] */
function copyViewerURL() {
    const url = window.location.origin + window.location.pathname;
    navigator.clipboard.writeText(url).then(() => alert("閲覧用リンクをコピーしました"));
}

/** 管理者引き継ぎ機能 [仕様3] */
function transferAdmin() {
    saveAndRender();
    const adminUrl = window.location.origin + window.location.pathname + "?admin=true";
    navigator.clipboard.writeText(adminUrl).then(() => alert("管理用URLをコピーしました。次の担当者に渡してください。"));
}

window.onload = init;
